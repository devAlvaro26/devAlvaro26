name: Generate Snake

on:
  # Run automatically every 24 hours
  schedule:
    - cron: "0 */24 * * *"
  
  # Allow manual execution from the Actions tab
  workflow_dispatch:
  
  # Run on every push to the main/master branch
  push:
    branches:
    - main
    - master

jobs:
  generate:
    permissions: 
      contents: write
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Generate github-contribution-grid-snake.svg
        uses: platane/snk/svg-only@v3
        with:
          github_user_name: devAlvaro26
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=%23f97316&color_dots=%23e2e8f0,%23bbf7d0,%2386efac,%2322c55e,%2316a34a
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2300f5ff&color_dots=%231e1b4b,%233730a3,%234338ca,%236366f1,%23a5b4fc
          
      - name: Push github-contribution-grid-snake.svg to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
